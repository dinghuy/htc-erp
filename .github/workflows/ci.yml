name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/ci/check-repo-hygiene.mjs
      - run: npm ci
        working-directory: backend
      - run: node scripts/sync-shared-contracts.mjs
      - run: git diff --exit-code -- frontend/src/shared/domain/generatedContracts.ts

  backend-core:
    needs: preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
      - run: npm ci
      - run: npm run sync:contracts
      - run: npm run typecheck
      - run: npm run build
      - run: npm run smoke:migration
      - run: npm run smoke:db-init
      - run: npm test

  backend-noncore:
    needs: preflight
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
      - run: npm ci
      - run: npm run test:noncore

  frontend-core:
    needs: preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
      - run: npm ci
      - run: npm run sync:contracts
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  frontend-noncore:
    needs: preflight
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
      - run: npm ci
      - run: npm run sync:contracts
      - run: npm run test:noncore
