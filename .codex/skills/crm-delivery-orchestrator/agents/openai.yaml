interface:
  display_name: "Legacy CRM Delivery Orchestrator"
  short_description: "Handle historical crm-app delivery references across MCP systems"
  default_prompt: "Use $crm-delivery-orchestrator only for legacy crm-app delivery references or migration cleanup. Use $app-delivery-orchestrator for active htc-erp work."

dependencies:
  tools:
    - type: "mcp"
      value: "linear"
      description: "Linear MCP server"
      transport: "streamable_http"
      url: "https://mcp.linear.app/mcp"
    - type: "mcp"
      value: "notion"
      description: "Notion MCP server"
      transport: "streamable_http"
      url: "https://mcp.notion.com/mcp"
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
    - type: "mcp"
      value: "playwright"
      description: "Playwright MCP server"

policy:
  allow_implicit_invocation: true
